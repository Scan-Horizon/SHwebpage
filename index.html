<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScanHorizon | Choose Language</title>
    <meta name="description" content="Choose your language to access the official ScanHorizon website.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://scan-horizon.com/">
    <link rel="alternate" hreflang="fr" href="https://scan-horizon.com/fr/">
    <link rel="alternate" hreflang="en" href="https://scan-horizon.com/en/">
    <link rel="alternate" hreflang="x-default" href="https://scan-horizon.com/">
    <style>
        :root {
            --bg: #050a15;
            --card: rgba(10, 18, 35, 0.88);
            --line: rgba(0, 210, 255, 0.35);
            --text: #ffffff;
            --muted: #b0c4de;
            --brand-a: #00d2ff;
            --brand-b: #0055ff;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: "Segoe UI", "Roboto", sans-serif;
            color: var(--text);
            background: radial-gradient(circle at 20% 20%, #12325e 0%, var(--bg) 45%), var(--bg);
            padding: 24px;
        }
        .card {
            width: min(560px, 100%);
            border: 1px solid var(--line);
            border-radius: 16px;
            background: var(--card);
            padding: 28px;
            backdrop-filter: blur(10px);
            box-shadow: 0 18px 48px rgba(0, 0, 0, 0.35);
            text-align: center;
        }
        h1 {
            margin: 0 0 10px;
            font-size: clamp(1.6rem, 3.5vw, 2.1rem);
            line-height: 1.2;
        }
        p {
            margin: 0 0 24px;
            color: var(--muted);
        }
        .actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        a {
            text-decoration: none;
            color: #fff;
            font-weight: 700;
            padding: 12px 18px;
            border-radius: 10px;
            border: 1px solid var(--line);
            background: linear-gradient(135deg, var(--brand-a), var(--brand-b));
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>ScanHorizon</h1>
        <p>Choisissez votre langue / Choose your language</p>
        <div class="actions">
            <a href="/fr/" lang="fr">Francais</a>
            <a href="/en/" lang="en">English</a>
        </div>
    </main>
    <script>
        (function () {
            if (window.location.hash) {
                return;
            }
            var lang = (navigator.language || "").toLowerCase();
            var target = lang.startsWith("fr") ? "/fr/" : "/en/";
            window.location.replace(target);
        })();
    </script>
</body>
</html>
